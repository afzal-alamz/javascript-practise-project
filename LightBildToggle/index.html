<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Bulb Toggle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>💡 Light Bulb Toggle</h1>
        
        <div class="bulb-container">
            <!-- Light Bulb -->
            <div class="bulb off" id="bulb">
                <div class="bulb-top"></div>
                <div class="bulb-middle"></div>
                <div class="bulb-bottom"></div>
                <div class="bulb-base"></div>
            </div>
            
            <!-- Light Rays -->
            <div class="rays" id="rays">
                <div class="ray ray1"></div>
                <div class="ray ray2"></div>
                <div class="ray ray3"></div>
                <div class="ray ray4"></div>
                <div class="ray ray5"></div>
                <div class="ray ray6"></div>
                <div class="ray ray7"></div>
                <div class="ray ray8"></div>
            </div>
        </div>
        
        <button class="toggle-btn" id="toggleBtn">Turn ON</button>
        
        <p class="status" id="status">Bulb is OFF</p>
    </div>

    <!-- Add your JavaScript file here -->
    <script src="script.js"></script>
</body>
</html>
