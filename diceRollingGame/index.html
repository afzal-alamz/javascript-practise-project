<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Rolling Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎲 Dice Rolling Game 🎲</h1>
        <p class="subtitle">Best of 5 Rounds</p>

        <div class="game-area">
            <!-- Player 1 -->
            <div class="player">
                <h2>Player 1</h2>
                <div class="dice" id="dice1">?</div>
                <p class="score">Score: <span id="score1">0</span></p>
            </div>

            <!-- VS Section -->
            <div class="middle">
                <button id="rollBtn">Roll Dice</button>
                <p id="result">Let's Play!</p>
                <p class="round">Round: <span id="round">0</span>/5</p>
            </div>

            <!-- Player 2 -->
            <div class="player">
                <h2>Player 2</h2>
                <div class="dice" id="dice2">?</div>
                <p class="score">Score: <span id="score2">0</span></p>
            </div>
        </div>

        <button id="resetBtn">Reset Game</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
