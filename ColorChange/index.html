<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎨 Color Changer</h1>
        <p class="description">Click any button to change the background color</p>
        
        <div class="button-group">
            <button class="color-btn" data-color="red">Red</button>
            <button class="color-btn" data-color="blue">Blue</button>
            <button class="color-btn" data-color="green">Green</button>
            <button class="color-btn" data-color="yellow">Yellow</button>
            <button class="color-btn" data-color="purple">Purple</button>
            <button class="color-btn random-btn" data-color="random">Random Color</button>
        </div>
        
        <div class="color-display">
            <p>Current Color: <span id="colorName">Default</span></p>
        </div>
    </div>

    <!-- Add your JavaScript file here -->
    <script src="script.js"></script>
</body>
</html>
