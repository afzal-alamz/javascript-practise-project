<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Image Slider</h1>
        
        <div class="slider">
            <img id="sliderImage" src="https://wpengine.com/wp-content/uploads/2021/05/optimize-images-1024x681.jpg" alt="Slider Image">
            
            <div class="controls">
                <button id="prevBtn">← Previous</button>
                <span id="imageCount">1/4</span>
                <button id="nextBtn">Next →</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
