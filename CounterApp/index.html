<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🔢 Counter App</h1>
        
        <div class="counter-display">
            <h2 id="counter">0</h2>
        </div>
        
        <div class="button-group">
            <button class="btn decrease-btn" id="decrease">
                <span>-</span>
                Decrease
            </button>
            
            <button class="btn reset-btn" id="reset">
                <span>↻</span>
                Reset
            </button>
            
            <button class="btn increase-btn" id="increase">
                <span>+</span>
                Increase
            </button>
        </div>
    </div>

    <!-- Add your JavaScript file here -->
    <script src="script.js"></script>
</body>
</html>
